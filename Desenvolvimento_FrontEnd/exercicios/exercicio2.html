<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Formulário de Reserva de Viagem Avançado</title>
    </head>
    <body>
        <h1>Formulário de Reserva de Viagem Avançado</h1>
        <form>
            <fieldset>
                <legend>Informações Pessoais</legend>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" /><br /><br />
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" /><br /><br />
            </fieldset>
            <fieldset>
                <legend>Serviços Desejados</legend>
                <input
                    type="checkbox"
                    id="compra-passagens"
                    name="servicos[]"
                    value="compra-passagens"
                />
                <label for="compra-passagens">Compra de Passagens</label><br />
                <input
                    type="checkbox"
                    id="reserva-hospedagem"
                    name="servicos[]"
                    value="reserva-hospedagem"
                />
                <label for="reserva-hospedagem">Reserva de Hospedagem</label
                ><br />
                <input
                    type="checkbox"
                    id="aluguel-veiculos"
                    name="servicos[]"
                    value="aluguel-veiculos"
                />
                <label for="aluguel-veiculos">Aluguel de Veículos</label
                ><br /><br />
            </fieldset>
            <fieldset>
                <legend>Forma de Pagamento</legend>
                <input
                    type="radio"
                    id="cartao-credito"
                    name="forma-pagamento"
                    value="cartao-credito"
                />
                <label for="cartao-credito">Cartão de Crédito</label><br />
                <input
                    type="radio"
                    id="boleto"
                    name="forma-pagamento"
                    value="boleto"
                />
                <label for="boleto">Boleto</label><br />
                <input
                    type="radio"
                    id="pix"
                    name="forma-pagamento"
                    value="pix"
                />
                <label for="pix">PIX</label><br /><br />
            </fieldset>
            <fieldset>
                <legend>Prazo de Pagamento</legend>
                <select name="prazo-pagamento">
                    <option value="a-vista">À Vista</option>
                    <option value="cinco-vezes-sem-juros">
                        Cinco Vezes Sem Juros
                    </option>
                    <option value="dez-vezes-com-juros">
                        Dez Vezes Com Juros
                    </option></select
                ><br /><br />
            </fieldset>
            <input type="submit" value="Enviar" />
        </form>
    </body>
</html>
